<title>BRAVE Development — Interaktivní 3D prohlídka bytu</title>
<style>
  :root{
    --surface:#ffffff; --surface-2:#efece5; --stage-bg:#d8d4cb;
    --ink:#1b1a17; --ink-2:#6b6862; --ink-3:#96928a;
    --line:#e5e1d8; --line-2:#d7d2c7;
    --accent:#9c7a46; --accent-2:#b18e56; --accent-ink:#ffffff;
    --good:#4f7a54; --good-bg:#e7efe6;
    --shadow: 0 1px 2px rgba(30,25,15,.06), 0 8px 30px rgba(30,25,15,.10);
    --shadow-lg: 0 2px 6px rgba(30,25,15,.10), 0 24px 60px rgba(30,25,15,.22);
    --glass: rgba(255,255,255,.72);
    --glass-line: rgba(255,255,255,.6);
    --radius:14px; --radius-sm:10px;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Segoe UI Mono", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface:#221f1b; --surface-2:#191712; --stage-bg:#0e0d0a;
      --ink:#f3efe7; --ink-2:#a9a39a; --ink-3:#7d786f;
      --line:#332f28; --line-2:#3f3a31;
      --accent:#c79b5c; --accent-2:#d8ac68; --accent-ink:#1a1610;
      --good:#82b487; --good-bg:#222c22;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 30px rgba(0,0,0,.5);
      --shadow-lg: 0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.6);
      --glass: rgba(28,25,21,.66);
      --glass-line: rgba(255,255,255,.08);
    }
  }
  :root[data-theme="light"]{
    --surface:#ffffff; --surface-2:#efece5; --stage-bg:#d8d4cb;
    --ink:#1b1a17; --ink-2:#6b6862; --ink-3:#96928a;
    --line:#e5e1d8; --line-2:#d7d2c7; --accent:#9c7a46; --accent-2:#b18e56; --accent-ink:#fff;
    --good:#4f7a54; --good-bg:#e7efe6; --glass: rgba(255,255,255,.72); --glass-line: rgba(255,255,255,.6);
    --shadow: 0 1px 2px rgba(30,25,15,.06), 0 8px 30px rgba(30,25,15,.10);
    --shadow-lg: 0 2px 6px rgba(30,25,15,.10), 0 24px 60px rgba(30,25,15,.22);
  }
  :root[data-theme="dark"]{
    --surface:#221f1b; --surface-2:#191712; --stage-bg:#0e0d0a;
    --ink:#f3efe7; --ink-2:#a9a39a; --ink-3:#7d786f;
    --line:#332f28; --line-2:#3f3a31; --accent:#c79b5c; --accent-2:#d8ac68; --accent-ink:#1a1610;
    --good:#82b487; --good-bg:#222c22; --glass: rgba(28,25,21,.66); --glass-line: rgba(255,255,255,.08);
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 30px rgba(0,0,0,.5);
    --shadow-lg: 0 2px 6px rgba(0,0,0,.5), 0 24px 60px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--surface-2);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden}
  button{font-family:inherit;color:inherit;cursor:pointer}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

  #app{height:100vh;height:100dvh;display:flex;overflow:hidden}

  /* ---------- STAGE ---------- */
  #stage{position:relative;flex:1;min-width:0;background:var(--stage-bg);overflow:hidden}
  #gl{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:grab}
  #gl.dragging{cursor:grabbing}
  .scene-vignette{position:absolute;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(120% 90% at 50% 42%, transparent 58%, rgba(0,0,0,.30) 100%)}

  .topbar{position:absolute;top:14px;left:14px;right:14px;z-index:20;display:flex;
    align-items:center;gap:12px;pointer-events:none}
  .brand,.crumbs,.tools{pointer-events:auto}
  .brand{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:999px;
    background:var(--glass);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid var(--glass-line);box-shadow:var(--shadow)}
  .brand .mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;color:var(--accent-ink);font-weight:800;font-size:13px}
  .brand b{font-weight:700;letter-spacing:.04em;font-size:14px}
  .brand span{color:var(--ink-2);font-weight:500;font-size:12px;letter-spacing:.14em;text-transform:uppercase}
  .crumbs{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:999px;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-line);box-shadow:var(--shadow);font-size:12.5px;min-width:0}
  .crumbs .sep{color:var(--ink-3)}
  .crumbs .muted{color:var(--ink-2)}
  .crumbs b{font-weight:650}
  .crumbs .unit{color:var(--accent);font-weight:650}
  .tools{margin-left:auto;display:flex;gap:8px;padding:6px;border-radius:999px;
    background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-line);box-shadow:var(--shadow)}
  .tbtn{width:38px;height:38px;border-radius:999px;border:1px solid transparent;background:transparent;
    display:grid;place-items:center;color:var(--ink);transition:background .18s,color .18s,transform .1s}
  .tbtn:hover{background:color-mix(in srgb,var(--ink) 8%,transparent)}
  .tbtn:active{transform:scale(.94)}
  .tbtn[aria-pressed="true"]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .tbtn svg{width:19px;height:19px}
  @media (max-width:560px){ .crumbs{display:none} }

  .minimap{position:absolute;left:16px;bottom:16px;z-index:15;width:186px;padding:11px 12px 9px;
    border-radius:var(--radius);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--glass-line);box-shadow:var(--shadow)}
  .minimap .cap{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2);
    display:flex;justify-content:space-between;margin-bottom:7px}
  .minimap svg{width:100%;height:auto;display:block}
  @media (max-width:820px){ .minimap{display:none} }

  .hint{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:14;
    display:flex;gap:14px;padding:8px 15px;border-radius:999px;font-size:11.5px;color:var(--ink-2);
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--glass-line);box-shadow:var(--shadow);white-space:nowrap}
  .hint kbd{font-family:var(--mono);font-size:10.5px;background:color-mix(in srgb,var(--ink) 12%,transparent);
    padding:2px 6px;border-radius:5px;color:var(--ink)}
  @media (max-width:820px){ .hint{display:none} }

  .hs{position:absolute;z-index:12;width:36px;height:36px;margin:0;padding:0;border:none;background:transparent;
    transform:translate(-50%,-50%);display:grid;place-items:center}
  .hs .pulse{position:absolute;width:26px;height:26px;border-radius:50%;border:2px solid var(--accent);
    animation:hspulse 2.4s ease-out infinite}
  .hs .core{position:relative;width:15px;height:15px;border-radius:50%;background:var(--accent);
    border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.35);transition:transform .15s}
  .hs:hover .core,.hs.active .core{transform:scale(1.25)}
  .hs[hidden]{display:none}
  @keyframes hspulse{0%{transform:scale(.55);opacity:.85}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}

  #pop{position:absolute;z-index:40;width:250px;max-width:78vw;padding:0;border-radius:var(--radius);
    background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-lg);
    opacity:0;transform:translateY(4px) scale(.98);pointer-events:none;transition:opacity .16s,transform .16s}
  #pop.show{opacity:1;transform:none;pointer-events:auto}
  #pop .pop-top{height:96px;border-radius:var(--radius) var(--radius) 0 0;background:var(--surface-2);position:relative;overflow:hidden}
  #pop .pop-body{padding:13px 15px 15px}
  #pop .pop-tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
  #pop h4{margin:4px 0 5px;font-size:15px;font-weight:650;letter-spacing:-.01em}
  #pop p{margin:0;font-size:12.8px;line-height:1.5;color:var(--ink-2)}
  #pop .pop-x{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:999px;border:none;
    background:var(--glass);display:grid;place-items:center;color:var(--ink)}

  /* ---------- PANEL ---------- */
  #panel{width:352px;flex:0 0 352px;background:var(--surface);border-left:1px solid var(--line);
    display:flex;flex-direction:column;z-index:30}
  .panel-head{padding:20px 22px 16px;border-bottom:1px solid var(--line)}
  .panel-head .eyebrow{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
  .panel-head h1{margin:7px 0 3px;font-size:22px;font-weight:680;letter-spacing:-.02em}
  .panel-head .meta{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:9px;font-size:12.5px;color:var(--ink-2)}
  .panel-head .meta b{color:var(--ink);font-weight:600}
  .status{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;
    background:var(--good-bg);color:var(--good);font-size:11px;font-weight:650;letter-spacing:.02em}
  .status .dot{width:6px;height:6px;border-radius:999px;background:var(--good)}

  .panel-scroll{flex:1;overflow-y:auto;padding:18px 22px 12px;scrollbar-width:thin}
  .group{margin-bottom:22px}
  .group > .g-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
  .g-label .t{font-size:12.5px;font-weight:680;letter-spacing:.02em}
  .g-label .v{font-size:12px;color:var(--ink-2)}
  .g-label .v b{color:var(--ink);font-weight:600}

  .packs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .pack{position:relative;text-align:left;padding:11px 11px 12px;border-radius:var(--radius-sm);
    background:var(--surface);border:1px solid var(--line-2);transition:border-color .16s,box-shadow .16s,transform .1s}
  .pack:hover{border-color:var(--ink-3)}
  .pack:active{transform:scale(.98)}
  .pack .pn{font-size:12.5px;font-weight:650}
  .pack .pp{font-size:11px;color:var(--ink-2);margin-top:3px;font-variant-numeric:tabular-nums}
  .pack[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .pack[aria-pressed="true"]::after{content:"";position:absolute;top:9px;right:9px;width:14px;height:14px;border-radius:999px;
    background:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}

  .swatches{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:56px;border:none;background:transparent;padding:0;text-align:center}
  .sw .chip{display:block;width:56px;height:44px;border-radius:10px;border:1px solid rgba(0,0,0,.14);
    box-shadow:inset 0 -8px 14px rgba(0,0,0,.14), inset 0 2px 3px rgba(255,255,255,.28);
    transition:transform .12s, box-shadow .16s}
  .sw:hover .chip{transform:translateY(-2px)}
  .sw[aria-pressed="true"] .chip{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--accent), inset 0 -8px 14px rgba(0,0,0,.16)}
  .sw .nm{display:block;font-size:11px;color:var(--ink-2);margin-top:6px;line-height:1.2}
  .sw[aria-pressed="true"] .nm{color:var(--ink);font-weight:600}
  .sw .up{display:block;font-size:10px;color:var(--ink-3);font-variant-numeric:tabular-nums}

  .panel-foot{border-top:1px solid var(--line);padding:16px 22px 18px;background:var(--surface)}
  .price-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4px}
  .price-row .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
  .price{font-size:27px;font-weight:720;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .price .cz{font-size:15px;font-weight:600;color:var(--ink-2);margin-left:3px}
  .price-sub{font-size:11.5px;color:var(--ink-2);font-variant-numeric:tabular-nums;margin-bottom:14px}
  .price-sub b{color:var(--accent);font-weight:650}
  .actions{display:flex;gap:9px}
  .btn{flex:1;height:44px;border-radius:11px;border:1px solid var(--line-2);background:var(--surface);
    font-size:13.5px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background .16s,border-color .16s,transform .1s}
  .btn:hover{background:var(--surface-2)}
  .btn:active{transform:scale(.98)}
  .btn svg{width:16px;height:16px}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .btn.primary:hover{background:var(--accent-2)}

  #toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,14px);z-index:60;
    padding:11px 18px;border-radius:12px;background:var(--ink);color:var(--surface);
    font-size:13px;font-weight:550;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:10px;max-width:88vw}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  #toast code{font-family:var(--mono);font-size:12px;background:color-mix(in srgb,var(--surface) 22%,transparent);
    padding:2px 7px;border-radius:5px}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important}
  }

  @media (max-width:820px){
    #app{flex-direction:column}
    #stage{flex:1;min-height:52vh}
    #panel{width:100%;flex:0 0 auto;max-height:46vh;border-left:none;border-top:1px solid var(--line);
      border-radius:18px 18px 0 0;margin-top:-18px;box-shadow:var(--shadow-lg)}
    .panel-head{padding:14px 18px 12px}
    .panel-head h1{font-size:19px}
    .panel-scroll{padding:14px 18px 8px}
    .panel-foot{padding:12px 18px 16px}
  }
</style>

<div id="app">
  <!-- ============ STAGE ============ -->
  <section id="stage">
    <canvas id="gl" aria-label="Fotorealistický 3D model obývacího pokoje s kuchyní — táhnutím se rozhlédnete, kolečkem přiblížíte, klávesami W A S D se pohybujete"></canvas>
    <div class="scene-vignette"></div>

    <button class="hs" data-id="okno" aria-label="Hotspot: Francouzské okno"><span class="pulse"></span><span class="core"></span></button>
    <button class="hs" data-id="kuchyn" aria-label="Hotspot: Kuchyňská linka"><span class="pulse"></span><span class="core"></span></button>
    <button class="hs" data-id="svetlo" aria-label="Hotspot: Scénické osvětlení"><span class="pulse"></span><span class="core"></span></button>

    <div class="topbar">
      <div class="brand"><span class="mark">B</span><b>BRAVE</b><span>Development</span></div>
      <div class="crumbs">
        <span class="muted">Rezidence Vltavská</span><span class="sep">/</span>
        <span class="muted">Dům B</span><span class="sep">/</span>
        <b>Byt B4</b><span class="sep">·</span><span class="unit">2+kk</span>
      </div>
      <div class="tools" role="toolbar" aria-label="Ovládání prohlídky">
        <button class="tbtn" id="btnDay" aria-pressed="false" title="Přepnout den / noc" aria-label="Přepnout den a noc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
        </button>
        <button class="tbtn" id="btnLight" aria-pressed="true" title="Zapnout / vypnout světla" aria-label="Zapnout nebo vypnout světla">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.5 10.9c.6.5 1 1.2 1 2h5c0-.8.4-1.5 1-2A6 6 0 0 0 12 3Z"/></svg>
        </button>
        <button class="tbtn" id="btnVR" aria-pressed="false" title="VR režim" aria-label="VR režim">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="3"/><path d="M9.5 13c-.5-1-2.5-1-3 0M17.5 13c-.5-1-2.5-1-3 0"/></svg>
        </button>
        <button class="tbtn" id="btnReset" title="Výchozí pohled a konfigurace" aria-label="Obnovit výchozí pohled a konfiguraci">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="tbtn" id="btnFS" title="Celá obrazovka" aria-label="Celá obrazovka">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        </button>
      </div>
    </div>

    <div class="minimap">
      <div class="cap"><span>Půdorys · 62 m²</span><span>2.NP</span></div>
      <svg viewBox="0 0 180 120" aria-label="Půdorys bytu s polohou kamery">
        <rect x="4" y="4" width="172" height="112" rx="4" fill="none" stroke="var(--line-2)" stroke-width="1.5"/>
        <line x1="120" y1="4" x2="120" y2="116" stroke="var(--line-2)" stroke-width="1.5"/>
        <text x="62" y="16" font-size="8" fill="var(--ink-2)" text-anchor="middle" font-family="var(--sans)">Obývací pokoj + kk</text>
        <text x="148" y="16" font-size="8" fill="var(--ink-2)" text-anchor="middle" font-family="var(--sans)">Ložnice</text>
        <g id="mmCam">
          <path d="M0,0 L20,-11 L20,11 Z" fill="var(--accent)" opacity=".18"/>
          <circle r="5" fill="var(--accent)" stroke="#fff" stroke-width="2"/>
        </g>
      </svg>
    </div>

    <div class="hint">
      <span><kbd>drag</kbd> orbit</span>
      <span><kbd>kolečko</kbd> zoom</span>
      <span><kbd>W A S D</kbd> pohyb</span>
      <span><kbd>klik</kbd> hotspot</span>
    </div>

    <div id="pop" role="dialog" aria-label="Detail hotspotu">
      <div class="pop-top" id="popTop"></div>
      <button class="pop-x" id="popX" aria-label="Zavřít">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <div class="pop-body"><div class="pop-tag" id="popTag"></div><h4 id="popH"></h4><p id="popP"></p></div>
    </div>
  </section>

  <!-- ============ PANEL ============ -->
  <aside id="panel">
    <div class="panel-head">
      <div class="eyebrow">Konfigurátor bytu · WebGL</div>
      <h1>Byt B4 · 2+kk</h1>
      <div class="meta">
        <span><b>62 m²</b> plocha</span>
        <span><b>2.NP</b> · jih</span>
        <span class="status"><span class="dot"></span>Volný</span>
      </div>
    </div>

    <div class="panel-scroll" id="cfg"></div>

    <div class="panel-foot">
      <div class="price-row"><span class="lab">Cena vč. konfigurace</span></div>
      <div class="price"><span id="priceVal">0</span><span class="cz">Kč</span></div>
      <div class="price-sub">Základ 8 950 000 Kč · příplatky <b id="surch">+0 Kč</b></div>
      <div class="actions">
        <button class="btn" id="btnSave">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          Uložit
        </button>
        <button class="btn primary" id="btnShare">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
          Sdílet
        </button>
      </div>
    </div>
  </aside>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  'use strict';

  /* ================= MODEL / CONFIG ================= */

  function hash2(x,y){ var s=Math.sin(x*127.1+y*311.7)*43758.5453; return s-Math.floor(s); }

    var xi=Math.floor(x), yi=Math.floor(y), xf=x-xi, yf=y-yi;

    var a=hash2(xi,yi), b=hash2(xi+1,yi), c=hash2(xi,yi+1), d=hash2(xi+1,yi+1);

  function pixelTex(size, fn){

      d[i]=rgb[0]; d[i+1]=rgb[1]; d[i+2]=rgb[2]; d[i+3]=255;
    }
    ctx.putImageData(img,0,0);
    return c;
  }

    if(keys.KeyD||keys.ArrowRight){ mx+=rx; mz+=rz; }
    if(keys.KeyA||keys.ArrowLeft){ mx-=rx; mz-=rz; }
    if(mx||mz){ var ml=Math.hypot(mx,mz); cam.tx+=mx/ml*sp; cam.tz+=mz/ml*sp;
      cam.tx=Math.min(2.6,Math.max(-2.6,cam.tx)); cam.tz=Math.min(3.5,Math.max(-3.5,cam.tz)); }

    var dpr=Math.min(2,window.devicePixelRatio||1);
    var cw=canvas.clientWidth, ch=canvas.clientHeight;
    if(canvas.width!==cw*dpr||canvas.height!==ch*dpr){ canvas.width=cw*dpr; canvas.height=ch*dpr; }
    gl.viewport(0,0,canvas.width,canvas.height);

    // keep eye above floor so planar reflection stays valid
    var minPitch=Math.asin(Math.max(-1,(0.25-cam.ty)/cam.r));
    if(cam.pitch<minPitch) cam.pitch=minPitch;

    var cp=Math.cos(cam.pitch);
    var eye=[cam.tx+Math.sin(cam.yaw)*cp*cam.r, cam.ty+Math.sin(cam.pitch)*cam.r, cam.tz+Math.cos(cam.yaw)*cp*cam.r];
    var P=persp(60*Math.PI/180, cw/ch, 0.1, 100);
    var V=lookAt(eye,[cam.tx,cam.ty,cam.tz],[0,1,0]);
    MVP=mul(P,V);

    gl.clearStencil(0);
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT|gl.STENCIL_BUFFER_BIT);
    gl.uniformMatrix4fv(loc.uMVP,false,new Float32Array(MVP));
    gl.uniform3fv(loc.uEye,eye);
    gl.uniform1f(loc.uExposure,L.exposure);
    gl.uniform3fv(loc.uAmb,L.amb); gl.uniform3fv(loc.uSunDir,L.sunDir); gl.uniform3fv(loc.uSunCol,L.sunCol);
    gl.uniform3fv(loc.uL1Pos,L.l1); gl.uniform3fv(loc.uL1Col,L.c1);
    gl.uniform3fv(loc.uL2Pos,L.l2); gl.uniform3fv(loc.uL2Col,L.c2);
    gl.uniform3fv(loc.uL3Pos,L.l3); gl.uniform3fv(loc.uL3Col,L.c3);

    var ks=Object.keys(GROUPS);

    // A) stencil-mark floor pixels
    gl.enable(gl.STENCIL_TEST);
    gl.stencilFunc(gl.ALWAYS,1,0xFF);
    gl.stencilOp(gl.KEEP,gl.KEEP,gl.REPLACE);
    gl.colorMask(false,false,false,false); gl.depthMask(false);
    bindAndDraw('floor',false); bindAndDraw('rug',false);
    gl.colorMask(true,true,true,true); gl.depthMask(true);

    // B) mirrored scene, only on floor pixels
    gl.stencilFunc(gl.EQUAL,1,0xFF);
    gl.stencilOp(gl.KEEP,gl.KEEP,gl.KEEP);
    gl.cullFace(gl.FRONT);
    for(var i=0;i<ks.length;i++){ if(!MIRROR_SKIP[ks[i]]) bindAndDraw(ks[i],true); }
    gl.cullFace(gl.BACK);
    gl.disable(gl.STENCIL_TEST);

    // C) floor & rug blended over reflection
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
    bindAndDraw('floor',false,1.0-floorRefl);
    bindAndDraw('rug',false,1.0);
    gl.disable(gl.BLEND);

    // D) rest of the scene
    for(var j=0;j<ks.length;j++){ var k=ks[j]; if(k!=='floor'&&k!=='rug'&&k!=='blob') bindAndDraw(k,false); }

    // E) contact shadows
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
    gl.depthMask(false);
    bindAndDraw('blob',false);
    gl.depthMask(true);
    gl.disable(gl.BLEND);

    // hotspot projection
    hsEls.forEach(function(el){
      var p=HS_POS[el.getAttribute('data-id')]; if(!p) return;
      var x=MVP[0]*p[0]+MVP[4]*p[1]+MVP[8]*p[2]+MVP[12];
      var y=MVP[1]*p[0]+MVP[5]*p[1]+MVP[9]*p[2]+MVP[13];
      var w=MVP[3]*p[0]+MVP[7]*p[1]+MVP[11]*p[2]+MVP[15];
      if(w<=0.1){ el.hidden=true; return; }
      var sx=(x/w*0.5+0.5)*cw, sy=(1-(y/w*0.5+0.5))*ch;
      if(sx<-40||sx>cw+40||sy<-40||sy>ch+40){ el.hidden=true; return; }
      el.hidden=false; el.style.left=sx+'px'; el.style.top=sy+'px';
    });

    if(mmCam){
      var mmx=4+(cam.tx+3)/6*172, mmy=4+(cam.tz+4)/8*112;
      var deg=Math.atan2(fz,fx)*180/Math.PI;
      mmCam.setAttribute('transform','translate('+mmx.toFixed(1)+','+mmy.toFixed(1)+') rotate('+deg.toFixed(1)+')');
    }
  }
  requestAnimationFrame(frame);

  /* ================= PANEL UI ================= */
  var cfgEl=document.getElementById('cfg');
  function money(n){ return new Intl.NumberFormat('cs-CZ').format(n); }
  function render(){
    cfgEl.innerHTML='';
    order.forEach(function(key){
      var o=CFG[key];
      var g=document.createElement('div'); g.className='group';
      var c=o.options.find(function(x){return x.id===o.current});
      g.innerHTML='<div class="g-label"><span class="t">'+o.label+'</span><span class="v">'+
        '<b>'+c.name+'</b>'+(c.price?' · +'+money(c.price)+' Kč':'')+'</span></div>';
      var wrap=document.createElement('div'); wrap.className=o.kind==='pack'?'packs':'swatches';
      o.options.forEach(function(opt){
        var b=document.createElement('button');
        b.className=o.kind==='pack'?'pack':'sw';
        b.setAttribute('aria-pressed',opt.id===o.current);
        if(o.kind==='pack'){
          b.innerHTML='<div class="pn">'+opt.name+'</div><div class="pp">'+(opt.price?'+'+money(opt.price):'v ceně')+'</div>';
        } else {
          b.setAttribute('aria-label',o.label+': '+opt.name);
          b.innerHTML='<span class="chip" style="background:'+opt.color+'"></span>'+
            '<span class="nm">'+opt.name+'</span><span class="up">'+(opt.price?'+'+money(opt.price):'v ceně')+'</span>';
        }
        b.onclick=function(){ o.current=opt.id; render(); applyScene(); updatePrice(true); };
        wrap.appendChild(b);
      });
      g.appendChild(wrap);
      cfgEl.appendChild(g);
    });
  }

  var priceEl=document.getElementById('priceVal'), surchEl=document.getElementById('surch');
  var shown=BASE;
  function total(){ var s=0; order.forEach(function(k){ s+=cur(k).price; }); return {sum:BASE+s, extra:s}; }
  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function updatePrice(animate){
    var t=total();
    surchEl.textContent=(t.extra?'+':'')+money(t.extra)+' Kč';
    if(reduce||!animate){ shown=t.sum; priceEl.textContent=money(t.sum); return; }
    var from=shown,to=t.sum,start=performance.now(),dur=420;
    function step(now){ var k=Math.min(1,(now-start)/dur), e=1-Math.pow(1-k,3);
      shown=Math.round(from+(to-from)*e); priceEl.textContent=money(shown);
      if(k<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  }

  /* ================= TOOLBAR ================= */
  function toast(msg,code){
    var t=document.getElementById('toast');
    t.innerHTML=msg+(code?' <code>'+code+'</code>':'');
    t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show')},2600);
  }
  var btnDay=document.getElementById('btnDay'), btnLight=document.getElementById('btnLight');
  btnDay.onclick=function(){ state.day=!state.day; btnDay.setAttribute('aria-pressed',!state.day); applyScene(); };
  btnLight.onclick=function(){ state.lights=!state.lights; btnLight.setAttribute('aria-pressed',state.lights); applyScene(); };
  document.getElementById('btnVR').onclick=function(){ toast('VR režim (WebXR) je součástí plné verze.'); };
  document.getElementById('btnReset').onclick=function(){
    CFG.package.current='comfort'; CFG.floor.current='oak'; CFG.wall.current='plaster'; CFG.kitchen.current='graphite';
    state.day=true; state.lights=true;
    btnDay.setAttribute('aria-pressed',false); btnLight.setAttribute('aria-pressed',true);
    resetCam(); render(); applyScene(); updatePrice(true); toast('Obnoven výchozí pohled i konfigurace.');
  };
  document.getElementById('btnFS').onclick=function(){
    var el=document.getElementById('app');
    if(!document.fullscreenElement){ if(el.requestFullscreen) el.requestFullscreen().catch(function(){}); }
    else if(document.exitFullscreen) document.exitFullscreen().catch(function(){});
  };
  function code(){ var s='BRV-B4-',a='ACDEFHJKMNPRTUVWXY3479';
    for(var i=0;i<5;i++) s+=a[Math.floor(Math.random()*a.length)]; return s; }
  document.getElementById('btnSave').onclick=function(){ toast('Konfigurace uložena do účtu ·',code()); };
  document.getElementById('btnShare').onclick=function(){
    var c=code(),url='brave.cz/b4?c='+c;
    if(navigator.clipboard) navigator.clipboard.writeText('https://'+url).catch(function(){});
    toast('Odkaz zkopírován ·',url);
  };

  /* ================= HOTSPOTS ================= */
  var HS={
    okno:{tag:'Exteriér',h:'Francouzské okno 2,4 m',p:'Jižní orientace, celoprosklené trojsklo Uw 0,7 W/m²K, elektrické stínění a přímý výstup na lodžii.',c:'linear-gradient(160deg,#aacbe6,#eadfce)'},
    kuchyn:{tag:'Vybavení',h:'Kuchyňská linka na míru',p:'Bezúchytkové fronty, kompaktní pracovní deska, vestavné spotřebiče Bosch a dřez Blanco. Layout dle výběru balíčku.',c:'linear-gradient(160deg,#3a3d42,#6b6862)'},
    svetlo:{tag:'Chytrá domácnost',h:'Scénické LED osvětlení',p:'Stmívatelné okruhy, přednastavené scény den/večer/kino a ovládání mobilní aplikací i hlasem.',c:'linear-gradient(160deg,#c79b5c,#9c7a46)'},
  };
  var pop=document.getElementById('pop'), stage=document.getElementById('stage'), activeHS=null;
  function openHS(el){
    var d=HS[el.getAttribute('data-id')]; if(!d) return;
    document.getElementById('popTag').textContent=d.tag;
    document.getElementById('popH').textContent=d.h;
    document.getElementById('popP').textContent=d.p;
    document.getElementById('popTop').style.background=d.c;
    if(activeHS) activeHS.classList.remove('active');
    el.classList.add('active'); activeHS=el;
    var r=el.getBoundingClientRect(), sr=stage.getBoundingClientRect();
    pop.classList.add('show');
    var pw=pop.offsetWidth, ph=pop.offsetHeight;
    var x=r.left-sr.left+r.width/2-pw/2;
    var y=r.top-sr.top-ph-14;
    if(y<8) y=r.top-sr.top+r.height+14;
    x=Math.max(10,Math.min(x,sr.width-pw-10));
    pop.style.left=x+'px'; pop.style.top=y+'px';
  }
  function closeHS(){ pop.classList.remove('show'); if(activeHS){activeHS.classList.remove('active');activeHS=null;} }
  hsEls.forEach(function(el){ el.addEventListener('click',function(ev){ ev.stopPropagation(); openHS(el); }); });
  document.getElementById('popX').onclick=closeHS;
  stage.addEventListener('pointerdown',function(e){ if(!e.target.closest('.hs')&&!e.target.closest('#pop')) closeHS(); });

  /* ================= INIT ================= */
  render(); applyScene(); updatePrice(false);
  if(!glOK){ toast('Tento prohlížeč nepodporuje WebGL.'); }
})();
</script>
